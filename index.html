// ─── IMPORT ───
function ImportPage({importTrades,exportAllData,importAllData}) {
  const [dragOver,setDragOver]=useState(false);
  const [result,setResult]=useState(null);
  const [jsonResult,setJsonResult]=useState(null);
  const ref=useRef();
  const jsonRef=useRef();

  // ── Blueberry Markets parser ──
  const parseBlueberry=(rows)=>{
    // Blueberry CSV has: Symbol,Side,Type,Qty,Filled Qty,Limit Price,Stop Price,Avg Fill Price,Status,Update Time,Position ID,Commission,Closed P&L,Net Closed P&L,Order ID
    // Each trade = 2 rows sharing the same Position ID: an opening order (Market, no P&L) and a closing order (with P&L)
    const filled = rows.filter(r=>(r['Status']||'').trim()==='Filled' && (r['Position ID']||'').trim()!=='');
    const posMap = {};
    filled.forEach(r=>{
      const pid = (r['Position ID']||'').trim();
      if(!pid) return;
      if(!posMap[pid]) posMap[pid]=[];
      posMap[pid].push(r);
    });

    const trades=[];
    Object.entries(posMap).forEach(([pid,orders])=>{
      if(orders.length<2) return;
      // Opening = row with no Closed P&L or empty Closed P&L; Closing = row with Closed P&L
      const opening = orders.find(o=>!o['Closed P&L']||o['Closed P&L'].trim()==='');
      const closing = orders.find(o=>o['Closed P&L']&&o['Closed P&L'].trim()!=='');
      if(!opening||!closing) return;

      const sym = (opening['Symbol']||'').replace(/\.I$/,'');
      const openSide = (opening['Side']||'').trim().toLowerCase();
      const side = openSide==='buy'?'Long':'Short';
      const entryPrice = Number(opening['Avg Fill Price'])||0;
      const exitPrice = Number(closing['Avg Fill Price'])||0;
      const size = opening['Filled Qty']||opening['Qty']||'';
      const commission = Number(closing['Commission'])||0;
      const closedPnl = Number(closing['Closed P&L'])||0;
      const netPnl = Number(closing['Net Closed P&L'])||closedPnl+commission;
      const openDate = (opening['Update Time']||'').slice(0,10);
      const closeDate = (closing['Update Time']||'').slice(0,10);
      const closeType = (closing['Type']||'').trim();

      trades.push({
        symbol:sym, side, entryPrice, exitPrice,
        size, stopLoss:closeType==='Stop Loss'?closing['Stop Price']||'':'',
        takeProfit:closeType==='Take Profit'?closing['Limit Price']||'':'',
        openDate, closeDate,
        pnl:netPnl, status:'closed',
        assetClass:detectAsset(sym), source:'Blueberry',
        closeType, commission,
      });
    });
    return trades;
  };

  const parseMT5=(rows)=>{
    return rows.map(r=>{
      const type=(r['Type']||r['type']||'').toString().toLowerCase();
      if(type!=='buy'&&type!=='sell')return null;
      const sym=r['Symbol']||r['symbol']||'';
      const pnl=Number(r['Profit']||r['profit']||0)+Number(r['Commission']||r['commission']||0)+Number(r['Swap']||r['swap']||0);
      const ct=r['Close Time']||r['close_time']||r['Close time']||'';
      return{symbol:sym,side:type==='buy'?'Long':'Short',entryPrice:Number(r['Price']||r['price']||r['Open Price']||0),exitPrice:Number(r['Close Price']||r['close_price']||0),size:r['Size']||r['Volume']||r['size']||r['volume']||'',stopLoss:r['S/L']||r['sl']||'',takeProfit:r['T/P']||r['tp']||'',openDate:r['Open Time']||r['open_time']||r['Open time']||'',closeDate:ct,pnl,status:ct?'closed':'open',assetClass:detectAsset(sym),source:'MT5'};
    }).filter(Boolean);
  };

  const parseGeneric=(rows)=>{
    return rows.map(r=>{
      const sym=r['Symbol']||r['symbol']||r['Instrument']||r['Pair']||'';
      const side=(r['Type']||r['Side']||r['side']||r['type']||r['Direction']||'').toString().toLowerCase();
      const sn=side.includes('buy')||side.includes('long')?'Long':side.includes('sell')||side.includes('short')?'Short':'';
      if(!sym||!sn)return null;
      const ct=r['Close Time']||r['close_time']||r['Close Date']||r['close_date']||'';
      const pnl=Number(r['Profit']||r['PnL']||r['P&L']||r['pnl']||r['profit']||0);
      return{symbol:sym,side:sn,entryPrice:Number(r['Open Price']||r['Entry']||r['Price']||r['Entry Price']||0),exitPrice:Number(r['Close Price']||r['Exit']||r['Exit Price']||0),size:r['Size']||r['Volume']||r['Lots']||'',stopLoss:r['S/L']||r['SL']||r['Stop Loss']||'',takeProfit:r['T/P']||r['TP']||r['Take Profit']||'',openDate:r['Open Time']||r['Open Date']||r['Date']||'',closeDate:ct,pnl,status:ct?'closed':'open',assetClass:detectAsset(sym),source:'Import'};
    }).filter(Boolean);
  };

  // ── MT5 HTML Report parser ──
  const parseMT5Html=(htmlText)=>{
    // MT5 HTML reports have a Positions section (or Deals section with in/out)
    // We use the Deals section which has: Time, Deal, Symbol, Type, Direction(in/out), Volume, Price, Order, [hidden], Commission, Swap, Fee(?), Profit, Balance, Comment
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlText, 'text/html');
    const allRows = doc.querySelectorAll('tr');
    const trades = [];

    // Strategy: find "in" and "out" deal pairs sharing the same symbol sequence
    // Deals section rows have <td nowrap> with "in" or "out" in the 5th column
    const deals = [];
    allRows.forEach(row => {
      const tds = row.querySelectorAll('td');
      if(tds.length < 10) return;
      // Check for nowrap attribute (deals section uses nowrap)
      const hasNowrap = tds[0]?.hasAttribute('nowrap');
      if(!hasNowrap) return;
      // Extract text content
      const cells = Array.from(tds).map(td => (td.textContent||'').trim().replace(/\u00a0/g,'').replace(/\s+/g,' '));
      // Filter: must have "in" or "out" as direction, and a symbol
      const direction = cells[4]; // "in" or "out"
      if(direction !== 'in' && direction !== 'out') return;
      const symbol = cells[2];
      if(!symbol) return;
      deals.push({
        time: cells[0],
        deal: cells[1],
        symbol: cells[2],
        type: cells[3], // buy or sell
        direction: cells[4], // in or out
        volume: cells[5],
        price: cells[6],
        order: cells[7],
        // cells[8] may be hidden
        // Find commission, swap, profit from remaining cells
        // We need to handle hidden columns - parse from the end
        allCells: cells,
      });
    });

    // Pair in/out deals by matching Position/Order references
    // The "order" field in deals refers to the Order that created it
    // Group by symbol and pair sequentially (in followed by matching out)
    const openDeals = [];
    deals.forEach(d => {
      if(d.direction === 'in') {
        openDeals.push(d);
      } else if(d.direction === 'out') {
        // Find matching open deal - same symbol, first unmatched
        const idx = openDeals.findIndex(o => o.symbol === d.symbol && !o.matched);
        if(idx >= 0) {
          const openDeal = openDeals[idx];
          openDeal.matched = true;
          // Extract numeric values from the closing deal's cells (from end)
          const c = d.allCells;
          // Profit is usually the 4th from last, commission etc before it
          // Parse all numeric-looking cells from position 9 onward
          const numCells = c.slice(8).map(s => s.replace(/[^\d.\-]/g,'')).filter(s=>s!=='');
          // Typical order: commission, swap, fee(?), profit, balance, comment
          // We need profit - it's usually the 2nd-to-last or 3rd-to-last numeric
          let profit = 0, commission = 0;
          // More reliable: search the row for profit value
          // In the actual data, the pattern is: commission, swap, fee, profit, balance
          if(numCells.length >= 4) {
            commission = parseFloat(numCells[0]) || 0;
            // swap = numCells[1]
            profit = parseFloat(numCells[numCells.length - 3]) || parseFloat(numCells[numCells.length - 2]) || 0;
          }

          const sym = d.symbol.replace(/\.raw$/i,'').replace(/\.I$/i,'');
          const openType = openDeal.type.toLowerCase();
          const side = openType === 'sell' ? 'Short' : 'Long';
          trades.push({
            symbol: sym,
            side,
            entryPrice: parseFloat(openDeal.price) || 0,
            exitPrice: parseFloat(d.price) || 0,
            size: openDeal.volume || '',
            stopLoss: '',
            takeProfit: '',
            openDate: (openDeal.time||'').slice(0,10).replace(/\./g,'-'),
            closeDate: (d.time||'').slice(0,10).replace(/\./g,'-'),
            pnl: profit + commission,
            status: 'closed',
            assetClass: detectAsset(sym),
            source: 'MT5',
          });
        }
      }
    });

    // Fallback: if deals approach found nothing, try Positions table directly
    if(trades.length === 0) {
      // Positions section: rows with bgcolor #FFFFFF or #F7F7F7 that have class="" tds
      // Structure: Open Time, Position, Symbol, Type, [hidden colspan=8], Volume, EntryPrice, S/L, T/P, CloseTime, ExitPrice, Commission, Swap, Profit
      allRows.forEach(row => {
        const bg = row.getAttribute('bgcolor');
        if(!bg || (bg !== '#FFFFFF' && bg !== '#F7F7F7')) return;
        const tds = row.querySelectorAll('td');
        if(tds.length < 8) return;
        // Skip rows with nowrap (those are deals section)
        if(tds[0]?.hasAttribute('nowrap')) return;

        const cells = Array.from(tds).map(td => ({
          text: (td.textContent||'').trim().replace(/\u00a0/g,'').replace(/\s+/g,' '),
          cls: td.getAttribute('class')||'',
          hidden: (td.getAttribute('class')||'').includes('hidden'),
          colspan: parseInt(td.getAttribute('colspan'))||1
        }));

        // Filter out hidden cells
        const visible = cells.filter(c => !c.hidden);
        if(visible.length < 10) return;

        // visible order: OpenTime, Position, Symbol, Type, Volume, EntryPrice, S/L, T/P, CloseTime, ExitPrice, Commission, Swap, Profit
        const openTime = visible[0]?.text || '';
        const symbol = (visible[2]?.text || '').replace(/\.raw$/i,'').replace(/\.I$/i,'');
        const type = (visible[3]?.text || '').toLowerCase();
        if(!symbol || (type !== 'buy' && type !== 'sell')) return;

        const volume = visible[4]?.text || '';
        const entryPrice = parseFloat(visible[5]?.text) || 0;
        const sl = visible[6]?.text || '';
        const tp = visible[7]?.text || '';
        const closeTime = visible[8]?.text || '';
        const exitPrice = parseFloat(visible[9]?.text) || 0;
        const commission = parseFloat(visible[10]?.text) || 0;
        const swap = parseFloat(visible[11]?.text) || 0;
        const profitText = visible[12]?.text || '0';
        const profit = parseFloat(profitText.replace(/[^\d.\-]/g,'')) || 0;

        trades.push({
          symbol,
          side: type === 'sell' ? 'Short' : 'Long',
          entryPrice, exitPrice,
          size: volume,
          stopLoss: sl, takeProfit: tp,
          openDate: openTime.slice(0,10).replace(/\./g,'-'),
          closeDate: closeTime.slice(0,10).replace(/\./g,'-'),
          pnl: profit + commission + swap,
          status: 'closed',
          assetClass: detectAsset(symbol),
          source: 'MT5',
        });
      });
    }

    return trades;
  };

  const handleFile=file=>{
    if(!file)return;setResult(null);
    const name = file.name.toLowerCase();
    const isHtml = name.endsWith('.html') || name.endsWith('.htm');

    if(isHtml) {
      // Read as text (handle both UTF-8 and UTF-16)
      const reader = new FileReader();
      reader.onload = e => {
        let text = e.target.result;
        // If it looks garbled (UTF-16 read as UTF-8), try re-reading
        const trades = parseMT5Html(text);
        if(!trades.length){setResult({error:'Could not parse MT5 HTML report. Make sure it contains a Positions or Deals section.'});return;}
        importTrades(trades);setResult({count:trades.length,format:'MT5 HTML Report'});
      };
      // Try reading as UTF-16LE first (common MT5 encoding), fallback to UTF-8
      reader.readAsText(file, 'UTF-16LE');
      // Also set a backup reader for UTF-8
      reader.onerror = () => {
        const reader2 = new FileReader();
        reader2.onload = e2 => {
          const trades = parseMT5Html(e2.target.result);
          if(!trades.length){setResult({error:'Could not parse MT5 HTML report.'});return;}
          importTrades(trades);setResult({count:trades.length,format:'MT5 HTML Report'});
        };
        reader2.readAsText(file, 'UTF-8');
      };
    } else {
      // CSV parsing
      Papa.parse(file,{header:true,skipEmptyLines:true,complete:res=>{
        if(!res.data?.length){setResult({error:'No data found'});return;}
        const cols=Object.keys(res.data[0]||{});
        const isBlueberry = cols.includes('Position ID') && cols.includes('Avg Fill Price') && cols.includes('Net Closed P&L');
        const isMT5csv = cols.some(c=>/ticket/i.test(c))||cols.some(c=>/s\/l/i.test(c));
        let trades, format;
        if(isBlueberry) { trades=parseBlueberry(res.data); format='Blueberry Markets'; }
        else if(isMT5csv) { trades=parseMT5(res.data); format='MT5 CSV'; }
        else { trades=parseGeneric(res.data); format='Generic CSV'; }
        if(!trades.length){setResult({error:'Could not parse trades. Check file format.'});return;}
        importTrades(trades);setResult({count:trades.length,format});
      },error:()=>setResult({error:'Error reading file.'})});
    }
  };

  const handleJsonImport=file=>{
    if(!file)return;setJsonResult(null);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.trades&&!data.journal&&!data.analyses){setJsonResult({error:'Invalid backup file format.'});return;}
        importAllData(data);
        setJsonResult({success:`Restored: ${(data.trades||[]).length} trades, ${(data.journal||[]).length} journal entries, ${(data.analyses||[]).length} analyses`});
      }catch{setJsonResult({error:'Could not parse JSON file.'});}
    };
    reader.readAsText(file);
  };

  return (
    <div>
      <div className="page-header"><div><h2>Import & Export</h2><p>Import trades and backup/restore your data</p></div></div>

      {/* JSON Backup/Restore */}
      <div className="card" style={{marginBottom:'14px',borderColor:'var(--accent)',borderWidth:'1.5px'}}>
        <div className="card-header"><div className="card-title" style={{color:'var(--accent)'}}>💾 Backup & Restore</div></div>
        <div style={{fontSize:'13px',color:'var(--text-2)',marginBottom:'14px',lineHeight:1.6}}>
          Your data is stored locally in your browser. Export a JSON backup regularly to avoid data loss. You can restore from a backup at any time.
        </div>
        <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
          <button className="btn btn-primary" onClick={exportAllData}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:15,height:15}}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Export Backup (JSON)
          </button>
          <button className="btn btn-secondary" onClick={()=>jsonRef.current?.click()}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{width:15,height:15}}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Restore from Backup
          </button>
          <input ref={jsonRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>handleJsonImport(e.target.files?.[0])} />
        </div>
        {jsonResult&&<div style={{marginTop:'12px',padding:'10px 14px',borderRadius:'8px',background:jsonResult.error?'var(--red-bg)':'var(--green-bg)',border:`1px solid ${jsonResult.error?'var(--red-border)':'var(--green-border)'}`,color:jsonResult.error?'var(--red)':'var(--green)',fontSize:'13px',fontWeight:500}}>{jsonResult.error||jsonResult.success}</div>}
      </div>

      {/* CSV Import */}
      <div className="card">
        <div className="card-header"><div className="card-title">Import Trades from CSV or HTML</div></div>
        <div className={`drop-zone ${dragOver?'dragover':''}`} onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer?.files?.[0])}} onClick={()=>ref.current?.click()}>
          <div style={{fontSize:'32px',marginBottom:'6px'}}>📁</div>
          <div style={{fontSize:'14px',fontWeight:500,color:'var(--text-2)'}}>Drop your file here or click to browse</div>
          <div style={{fontSize:'12px',color:'var(--text-3)',marginTop:'4px'}}>Auto-detects: MT5 HTML Report, Blueberry Markets CSV, MT5 CSV, or generic CSV</div>
          <input ref={ref} type="file" accept=".csv,.tsv,.txt,.html,.htm" style={{display:'none'}} onChange={e=>handleFile(e.target.files?.[0])} />
        </div>
        {result&&<div style={{marginTop:'14px',padding:'10px 14px',borderRadius:'8px',background:result.error?'var(--red-bg)':'var(--green-bg)',border:`1px solid ${result.error?'var(--red-border)':'var(--green-border)'}`,color:result.error?'var(--red)':'var(--green)',fontSize:'13px',fontWeight:500}}>{result.error||`✓ Imported ${result.count} trades from ${result.format}`}</div>}
      </div>

      <div className="card">
        <div className="card-header"><div className="card-title">Export Instructions</div></div>
        <div style={{fontSize:'13px',color:'var(--text-2)',lineHeight:1.7}}>
          <p><strong style={{color:'var(--session-ny)'}}>MetaTrader 5 (HTML):</strong> History tab → Right-click → Select range → Right-click → Report → HTML (Internet Explorer)</p>
          <p style={{marginTop:'4px',fontSize:'12px',color:'var(--text-3)'}}>↳ Auto-detected. Parses the Positions and Deals tables from the HTML report. Supports both UTF-8 and UTF-16 encoding.</p>
          <p style={{marginTop:'10px'}}><strong style={{color:'var(--accent)'}}>Blueberry Markets (CSV):</strong> Client portal → Order History → Select "All" → Export CSV</p>
          <p style={{marginTop:'4px',fontSize:'12px',color:'var(--text-3)'}}>↳ Auto-detected via Position ID column. Reconstructs trades from order pairs.</p>
          <p style={{marginTop:'10px'}}><strong>Generic CSV:</strong> Needs columns: Symbol, Type (buy/sell), Open Price, Close Price, Profit, Open Time, Close Time</p>
        </div>
      </div>
    </div>
  );
}

// ─── RENDER ───
ReactDOM.render(<AppWrapper/>,document.getElementById('root'));
</script>
</body>
</html>
